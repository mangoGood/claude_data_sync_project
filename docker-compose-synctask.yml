# Isolated infra stack for running the sync/DR/subscription project locally.
# - MySQL  : metadata DB (sync_task_db) + demo source/target schemas, host port 33306
# - Kafka  : single-node (KRaft-less, uses bundled zookeeper), host listener localhost:29092
# Brought up with: docker compose -f docker-compose-synctask.yml up -d
services:
  synctask-mysql:
    image: docker.1ms.run/mysql:8.0
    container_name: synctask-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "33306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      synctask-net:
        ipv4_address: 192.168.150.10

  synctask-zk:
    image: docker.1ms.run/confluentinc/cp-zookeeper:7.3.0
    container_name: synctask-zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      synctask-net:
        ipv4_address: 192.168.150.11

  synctask-kafka:
    image: docker.1ms.run/confluentinc/cp-kafka:7.3.0
    container_name: synctask-kafka
    depends_on:
      - synctask-zk
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: synctask-zk:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://synctask-kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      synctask-net:
        ipv4_address: 192.168.150.12

networks:
  synctask-net:
    driver: bridge
    # 固定子网 + 各容器静态 IP：避免容器/宿主重启后容器 IP 变化
    # （OrbStack/Docker 默认按启动顺序动态分配，重启后可能漂移）。
    ipam:
      config:
        - subnet: 192.168.150.0/24
