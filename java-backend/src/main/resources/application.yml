# ============================================================
# Sync Task Backend 应用配置
# ============================================================
server:
  port: 38080
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 8192
    connection-timeout: 20000

spring:
  application:
    name: sync-task-backend

  # ============================================================
  # 主数据库（业务库，存储任务/用户/审计等元数据）
  # ============================================================
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:33306/sync_task_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: backend-hikari-pool

  # ============================================================
  # JPA / Hibernate
  # ============================================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ============================================================
  # Kafka（任务状态回传 + 任务创建事件）
  # ============================================================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 1
    consumer:
      group-id: sync-task-group
      task-created-group-id: task-created-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.info.headers: false
    listener:
      ack-mode: manual_immediate
    topics:
      task-created: sync-task-created
      task-status: sync-task-status

  # ============================================================
  # Spring Security 默认账号（仅用于 Actuator 端点，业务鉴权使用 JWT）
  # ============================================================
  security:
    user:
      name: admin
      password: admin

  # ============================================================
  # 异步任务线程池
  # ============================================================
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
      thread-name-prefix: workflow-async-

# ============================================================
# JWT 鉴权配置
# ============================================================
jwt:
  secret: ${JWT_SECRET:synctask-secret-key-very-long-string-for-jwt-token-generation-and-validation-2024}
  expiration: ${JWT_EXPIRATION:86400000}

# ============================================================
# 应用业务配置
# ============================================================
app:
  # 任务文件存储根目录（binlog/thl 临时文件）
  task:
    file-base-path: ${TASK_FILE_BASE_PATH:./files}
  # CORS 允许的源
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:38080,http://127.0.0.1:38080,http://localhost:3000}
  # 资源配额默认值（新用户默认配额）
  quota:
    default:
      max-tasks: 50
      max-concurrent-tasks: 5
      max-storage-mb: 10240
      api-rate-limit-per-min: 100
  # 告警通知默认配置
  alert:
    webhook-timeout-seconds: 5
    retry-notify-times: 3

# ============================================================
# 日志级别
# ============================================================
logging:
  level:
    com.synctask: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
